<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments - Payment Management System</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-shield-alt"></i> Admin Panel</h2>
                <p id="adminEmail">admin@demo.com</p>
            </div>
            
            <div class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                    <li><a href="payments.html" class="active"><i class="fas fa-credit-card"></i> Payments</a></li>
                    <li><a href="users.html"><i class="fas fa-users"></i> Manage Users</a></li>
                    <li><a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a></li>
                    <li><a href="requests.html"><i class="fas fa-trash-alt"></i> Delete Requests</a></li>
                    <li><a href="settings.html"><i class="fas fa-cog"></i> Settings</a></li>
                    <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                </ul>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="header">
                <h1><i class="fas fa-credit-card"></i> Payment History</h1>
                <p>View and manage all payment transactions</p>
            </div>

            <!-- Filter Controls -->
            <div class="card mb-20">
                <div class="flex justify-between align-center gap-20">
                    <div class="form-group" style="margin-bottom: 0; flex: 1;">
                        <label for="dateFilter" class="form-label">Filter by Date</label>
                        <input type="date" id="dateFilter" class="form-control">
                    </div>
                    <div class="form-group" style="margin-bottom: 0; flex: 1;">
                        <label for="roleFilter" class="form-label">Filter by Role</label>
                        <select id="roleFilter" class="form-control">
                            <option value="">All Roles</option>
                            <option value="user">User</option>
                            <option value="senior">Senior</option>
                            <option value="leader">Leader</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 0; flex: 1;">
                        <label for="statusFilter" class="form-label">Filter by Status</label>
                        <select id="statusFilter" class="form-control">
                            <option value="">All Status</option>
                            <option value="success">Success</option>
                            <option value="pending">Pending</option>
                            <option value="failed">Failed</option>
                        </select>
                    </div>
                    <div style="align-self: flex-end;">
                        <button class="btn btn-secondary" id="clearFilters">
                            <i class="fas fa-times"></i> Clear
                        </button>
                    </div>
                </div>
            </div>

            <!-- Payments Table -->
            <div class="table-container">
                <table id="paymentsTable" class="table" style="width: 100%;">
                    <thead>
                        <tr>
                            <th>Payment ID</th>
                            <th>Sender</th>
                            <th>Receiver</th>
                            <th>Amount</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Razorpay ID</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data will be populated by JavaScript -->
                    </tbody>
                </table>
            </div>

            <!-- Export Options -->
            <div class="card mt-20">
                <h3><i class="fas fa-download"></i> Export Options</h3>
                <div class="flex gap-10">
                    <button class="btn btn-success" id="exportCSV">
                        <i class="fas fa-file-csv"></i> Export CSV
                    </button>
                    <button class="btn btn-primary" id="exportPDF">
                        <i class="fas fa-file-pdf"></i> Export PDF
                    </button>
                    <button class="btn btn-warning" id="exportExcel">
                        <i class="fas fa-file-excel"></i> Export Excel
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Payment Details Modal -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Payment Details</h2>
                <span class="close">&times;</span>
            </div>
            <div id="paymentDetails">
                <!-- Payment details will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="js/payments.js"></script>
</body>
</html>
